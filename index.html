<!DOCTYPE html>
<html>
<head>
    <title>XYZ Corporation</title>
    <link href="https://fonts.googleapis.com/css?family=Lobster|Montserrat|Poppins" rel="stylesheet">
    <style>
        /* General Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        
        * {
            box-sizing: border-box;
        }
        
        /* Navigation */
        nav {
            width: 100%;
            background: #444;
            padding: 15px 0;
            text-align: center;
        }
        nav h1 {
            color: #fff;
            margin: 0;
        }
        
        #navli {
            list-style: none;
            padding: 0;
        }
        #navli li {
            display: inline;
            margin: 0 15px;
        }
        #navli a {
            text-decoration: none;
            color: #fff;
            font-size: 18px;
        }
        .homered {
            color: red;
        }
        
        /* Container Styles */
        .container, .form-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }
        
        /* Heading Styles */
        h1 {
            font-family: 'Lobster', cursive;
            font-weight: 200;
            font-size: 50px;
            margin-top: 100px;
            text-align: center;
            color: #333;
        }
        p {
            font-family: 'Montserrat', sans-serif;
            font-size: 30px;
            text-align: center;
            color: #555;
        }
        
        /* Button Styles */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background: #444;
            border-radius: 5px;
            border: none;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        .btn:hover {
            background: #ff6f61;
            transform: scale(1.1);
        }
        
        /* Form Styles */
        form input,
        form select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        
        form .form-btn {
            background: #444;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        form .form-btn:hover {
            background: #ff6f61;
            transform: scale(1.1);
        }
        
        /* Error Message Styles */
        .error-msg {
            display: block;
            background: #ff6f61;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>XYZ Corp.</h1>
            <ul id="navli">
                <li><a class="homered" href="index.html">HOME</a></li>
                <li><a class="homeblack" href="aboutus.html">ABOUT US</a></li>
                <li><a class="homeblack" href="contact.html">CONTACT</a></li>
                <li><a class="homeblack" href="elogin.html">LOG IN</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="container">
        <img src="hero-banner.png" style="width: 100%; border-radius: 10px; margin-bottom: 20px;">
        <h1>Welcome to XYZ Corp.</h1>
        <p>Your One Stop Solution</p>
    </div>
</body>
</html>
