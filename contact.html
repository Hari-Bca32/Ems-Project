<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Employee Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Reset default styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Body Styling */
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #1f4037, #99f2c8);
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 20px;
    }

    /* Navigation Bar */
    nav {
        width: 100%;
        background: #222;
        padding: 15px 0;
        text-align: center;
    }

    nav h1 {
        color: #fff;
        margin-bottom: 10px;
    }

    #navli {
        list-style-type: none;
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 0;
    }

    #navli li {
        display: inline;
    }

    #navli a {
        color: white;
        text-decoration: none;
        padding: 10px 15px;
        border-radius: 5px;
        transition: background 0.3s ease-in-out;
    }

    #navli a:hover {
        background: #ff6f61;
    }

    /* Contact Card Styling */
    .contact-card {
        max-width: 600px;
        margin: 50px auto;
        padding: 30px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
    }

    /* Page Wrapper */
    .page-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        padding-top: 50px;
    }

    /* Table Styling */
    table {
        width: 80%;
        border-collapse: collapse;
        margin: 20px auto;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    th {
        background: #222;
        color: white;
    }

    tr:hover {
        background-color: #f5f5f5;
    }

    /* Footer */
    footer {
        margin-top: auto;
        width: 100%;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        #navli {
            flex-wrap: wrap;
            justify-content: center;
        }

        table {
            width: 95%;
        }

        th, td {
            padding: 10px;
            font-size: 14px;
        }
    }
  </style>
</head>
<body>

  <nav>
    <h1>Employee Management System</h1>
    <ul id="navli">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="contact-card">
    <h2>Contact Us</h2>
    <p class="mt-4"><strong>Company Name:</strong> XYZ Corporation</p>
    <p><strong>Address:</strong> 123, Business Street, City Name, State, ZIP Code</p>
    <p><strong>Phone:</strong> +91 98765 43210</p>
    <p><strong>Email:</strong> contact@xyzcompany.com</p>
    <p><strong>Website:</strong> <a href="https://www.xyzcompany.com" target="_blank">www.xyzcompany.com</a></p>
  </div>

  <footer class="bg-dark text-white text-center py-3">
    &copy; 2025 XYZ Corporation - Employee Management System
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
